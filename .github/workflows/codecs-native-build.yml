# Cross-platform configure+build matrix for miniav_tools_codecs/native — the
# FFmpeg-free first-party codec asset (libopus + dr_mp3/dr_flac/stb_vorbis +
# frame_convert + the Windows-only MF sources, which compile to empty TUs
# elsewhere).
#
# Purpose (P3.1): catch per-OS build regressions — a bare _WIN32 gate, a
# missing libm link, an opus.cmake fetch break — on every push, WITHOUT any
# Dart/pub involvement (mirrors native-build.yml). Runtime behaviour lives in
# the Dart suites (dart-ci.yml); this is purely the compile gate that keeps
# "compiles everywhere" true while development happens on Windows.
name: codecs-native-build

on:
  push:
    paths:
      - "miniav_tools/miniav_tools_codecs/native/**"
      - ".github/workflows/codecs-native-build.yml"
  pull_request:
    paths:
      - "miniav_tools/miniav_tools_codecs/native/**"
      - ".github/workflows/codecs-native-build.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: miniav_tools/miniav_tools_codecs/native

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (arm64-v8a, API 24)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-24
      - name: Build
        run: cmake --build build --parallel

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (device arm64)
        # Unix Makefiles (not Xcode) so the unsigned shared lib builds without
        # a signing identity — same recipe as native-build.yml.
        run: >
          cmake -B build
          -G "Unix Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_SYSTEM_NAME=iOS
          -DCMAKE_OSX_ARCHITECTURES=arm64
      - name: Build
        run: cmake --build build --parallel
