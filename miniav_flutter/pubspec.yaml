name: miniav_flutter
description: Flutter companion for miniav. Re-exports the full miniav API and auto-registers a WidgetsBindingObserver that calls MiniAV.dispose() on hot restart, preventing "Callback invoked after it has been deleted" crashes.
version: 0.5.10
repository: https://github.com/PracticalXR/miniAV/tree/master/miniav_flutter

environment:
  sdk: ^3.11.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  miniav: 0.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
